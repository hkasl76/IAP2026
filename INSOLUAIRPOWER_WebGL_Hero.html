<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOLUAIRPOWER Hero</title>
<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#020812;
font-family:Arial,sans-serif;
}
#title{
position:absolute;
left:50%;
bottom:120px;
transform:translateX(-50%);
font-size:72px;
font-weight:700;
letter-spacing:4px;
background:linear-gradient(#ffe08a,#c9961a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
animation:titleIn 2s forwards 4s;
}
#tagline{
position:absolute;
left:50%;
bottom:50px;
transform:translateX(-50%);
text-align:center;
color:#d7d7d7;
font-size:24px;
opacity:0;
animation:tagIn 2s forwards 5.5s;
}
@keyframes titleIn{to{opacity:1}}
@keyframes tagIn{to{opacity:1}}
</style>
</head>
<body>

<div id="title">INSOLUAIRPOWER</div>
<div id="tagline">
Building a Cleaner Carbon Future<br>
for Industry and Society
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,2);
scene.add(ambient);

const light = new THREE.PointLight(0xffffff,15);
light.position.set(5,8,10);
scene.add(light);

// particles
const count = 3000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);
for(let i=0;i<count*3;i++){
 pos[i]=(Math.random()-0.5)*40;
}
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

const particles = new THREE.Points(
 geo,
 new THREE.PointsMaterial({
   color:0x00d9c8,
   size:0.03
 })
);
scene.add(particles);

// rings
const rings=[];
for(let i=0;i<3;i++){
 const ring = new THREE.Mesh(
   new THREE.TorusGeometry(4+i,0.03,16,250),
   new THREE.MeshBasicMaterial({
      color:0x00d9c8,
      transparent:true,
      opacity:0.25
   })
 );
 ring.rotation.x=Math.PI/2;
 rings.push(ring);
 scene.add(ring);
}

// gold material
const gold = new THREE.MeshPhysicalMaterial({
 color:0xd4af37,
 metalness:1,
 roughness:0.05,
 clearcoat:1
});

// O
const O = new THREE.Mesh(
 new THREE.TorusGeometry(1.4,0.35,64,200),
 gold
);
scene.add(O);

// molecule spheres
const spheres=[];
const targets=[[-2,1.3,0],[2,1.3,0],[-2,-1.3,0]];

targets.forEach(t=>{
 const s=new THREE.Mesh(
  new THREE.SphereGeometry(0.45,32,32),
  gold
 );
 s.position.set(
  (Math.random()-0.5)*12,
  (Math.random()-0.5)*12,
  (Math.random()-0.5)*12
 );
 scene.add(s);
 spheres.push({mesh:s,target:t});
});

function animate(){
 requestAnimationFrame(animate);

 const time=performance.now()*0.001;

 camera.position.x=Math.sin(time*0.2)*0.6;
 camera.position.y=Math.cos(time*0.2)*0.2;
 camera.lookAt(0,0,0);

 rings[0].rotation.z += 0.002;
 rings[1].rotation.z -= 0.0015;
 rings[2].rotation.z += 0.001;

 O.rotation.y += 0.005;

 spheres.forEach((s)=>{
   s.mesh.position.lerp(
     new THREE.Vector3(...s.target),
     0.01
   );
 });

 renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
 renderer.setSize(window.innerWidth,window.innerHeight);
 camera.aspect=window.innerWidth/window.innerHeight;
 camera.updateProjectionMatrix();
});
</script>

</body>
</html>

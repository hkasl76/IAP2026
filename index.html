<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOLUAIRPOWER - O2 Molecule</title>
<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#0d1f2d;
font-family:Arial,sans-serif;
}
#title{
position:absolute;
left:50%;
bottom:80px;
transform:translateX(-50%);
font-size:72px;
font-weight:700;
letter-spacing:8px;
background:linear-gradient(#d4af37,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
animation:titleIn 2s forwards 3s;
text-shadow: 0 0 30px rgba(212,175,55,0.5);
}
#tagline{
position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
text-align:center;
color:#4dd0e1;
font-size:18px;
opacity:0;
animation:tagIn 2s forwards 4s;
letter-spacing:2px;
}
@keyframes titleIn{to{opacity:1}}
@keyframes tagIn{to{opacity:1}}
</style>
</head>
<body>

<div id="title">INSOLUAIRPOWER</div>
<div id="tagline">Building a Cleaner Carbon Future</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1f2d);
scene.fog = new THREE.Fog(0x0d1f2d, 100, 200);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Strong lighting for golden shine
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0xffd700, 3);
pointLight1.position.set(15, 15, 20);
pointLight1.castShadow = true;
pointLight1.intensity = 3.5;
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xffed4e, 2.5);
pointLight2.position.set(-15, -10, 15);
pointLight2.castShadow = true;
scene.add(pointLight2);

const pointLight3 = new THREE.PointLight(0x4dd0e1, 2);
pointLight3.position.set(0, 20, 10);
pointLight3.castShadow = true;
scene.add(pointLight3);

// Hexagonal Lattice Background - BRIGHT CYAN
function createHexagonalLattice() {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const colors = [];
  const spacing = 2;
  
  for(let x = -10; x <= 10; x++) {
    for(let y = -10; y <= 10; y++) {
      const offsetX = (y % 2) * spacing / 2;
      const posX = x * spacing + offsetX;
      const posY = y * spacing * Math.sqrt(3) / 2;
      const posZ = -15 + Math.random() * 2;
      
      vertices.push(posX, posY, posZ);
      
      // Bright cyan color
      colors.push(0.0, 1.0, 1.0);
    }
  }
  
  // Create hexagon lines
  const lines = new THREE.BufferGeometry();
  const lineVertices = [];
  
  for(let x = -10; x <= 10; x++) {
    for(let y = -10; y <= 10; y++) {
      const offsetX = (y % 2) * spacing / 2;
      const posX = x * spacing + offsetX;
      const posY = y * spacing * Math.sqrt(3) / 2;
      const posZ = -15;
      
      // Connect to neighbors
      if(x < 10) {
        const nextOffsetX = ((y+1) % 2) * spacing / 2;
        const nextX = (x+1) * spacing + offsetX;
        lineVertices.push(posX, posY, posZ);
        lineVertices.push(nextX, posY, posZ);
      }
      
      if(y < 10) {
        const nextOffsetX = ((y+1) % 2) * spacing / 2;
        const nextY = (y+1) * spacing * Math.sqrt(3) / 2;
        const nextX = x * spacing + nextOffsetX;
        lineVertices.push(posX, posY, posZ);
        lineVertices.push(nextX, nextY, posZ);
      }
    }
  }
  
  lines.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lineVertices), 3));
  const lineMaterial = new THREE.LineBasicMaterial({
    color: 0x00ffff,
    linewidth: 3,
    fog: false,
    emissive: 0x00ffff,
    emissiveIntensity: 0.8
  });
  const hexLines = new THREE.LineSegments(lines, lineMaterial);
  return hexLines;
}

const hexLattice = createHexagonalLattice();
scene.add(hexLattice);

// Particle system - CYAN GLOW
const particleCount = 3000;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount * 3; i += 3) {
  particlePositions[i] = (Math.random() - 0.5) * 80;
  particlePositions[i + 1] = (Math.random() - 0.5) * 80;
  particlePositions[i + 2] = (Math.random() - 0.5) * 50 - 15;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMaterial = new THREE.PointsMaterial({
  color: 0x00ffff,
  size: 0.15,
  sizeAttenuation: true,
  emissive: 0x00ffff,
  emissiveIntensity: 0.6,
  fog: false
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// BRIGHT GOLDEN Material - with strong metalness
const goldMaterial = new THREE.MeshStandardMaterial({
  color: 0xffd700,
  metalness: 1.0,
  roughness: 0.15,
  emissive: 0xffaa00,
  emissiveIntensity: 0.6,
  envMapIntensity: 1.5
});

// Create environment for better reflections
const canvas = document.createElement('canvas');
canvas.width = 1;
canvas.height = 1;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#333';
ctx.fillRect(0, 0, 1, 1);
const envTexture = new THREE.CanvasTexture(canvas);

// O2 Molecule - Center Oxygen Ring - BRIGHT GOLDEN
const ringGeometry = new THREE.TorusGeometry(2.5, 0.5, 128, 200);
const centerRing = new THREE.Mesh(ringGeometry, goldMaterial);
centerRing.castShadow = true;
centerRing.receiveShadow = true;
scene.add(centerRing);

// Connecting rods - BRIGHT GOLDEN
const rodGeometry = new THREE.CylinderGeometry(0.2, 0.2, 4.5, 64);
const rod1 = new THREE.Mesh(rodGeometry, goldMaterial);
rod1.position.set(0, 0, 0);
rod1.rotation.z = Math.PI / 2;
rod1.castShadow = true;
rod1.receiveShadow = true;
scene.add(rod1);

const rod2 = new THREE.Mesh(rodGeometry, goldMaterial);
rod2.position.set(0, 0, 0);
rod2.rotation.z = -Math.PI / 2;
rod2.castShadow = true;
rod2.receiveShadow = true;
scene.add(rod2);

// Oxygen atoms (spheres) - BRIGHT GOLDEN with glow
const sphereGeometry = new THREE.SphereGeometry(1.0, 128, 128);
const spheres = [];

const positions = [
  {x: 4.5, y: 0, z: 0},
  {x: -4.5, y: 0, z: 0},
  {x: 0, y: 4.5, z: 0}
];

positions.forEach(pos => {
  const sphere = new THREE.Mesh(sphereGeometry, goldMaterial);
  sphere.position.set(pos.x, pos.y, pos.z);
  sphere.castShadow = true;
  sphere.receiveShadow = true;
  scene.add(sphere);
  
  // Add glow sphere
  const glowGeometry = new THREE.SphereGeometry(1.1, 32, 32);
  const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0xffaa00,
    emissive: 0xffaa00,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.3
  });
  const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
  glowSphere.position.copy(sphere.position);
  scene.add(glowSphere);
  
  spheres.push({
    mesh: sphere,
    glow: glowSphere,
    startPos: {x: pos.x, y: pos.y, z: pos.z}
  });
});

// O2 text label - GOLDEN
const canvas2 = document.createElement('canvas');
canvas2.width = 512;
canvas2.height = 256;
const ctx2 = canvas2.getContext('2d');
ctx2.fillStyle = '#d4af37';
ctx2.font = 'bold 140px Arial';
ctx2.textAlign = 'center';
ctx2.textBaseline = 'middle';
ctx2.shadowColor = '#ffaa00';
ctx2.shadowBlur = 20;
ctx2.fillText('O₂', 256, 128);

const texture = new THREE.CanvasTexture(canvas2);
const spriteMaterial = new THREE.SpriteMaterial({map: texture});
const sprite = new THREE.Sprite(spriteMaterial);
sprite.position.z = 10;
sprite.scale.set(10, 5, 1);
scene.add(sprite);

// Animation loop
let time = 0;
function animate(){
  requestAnimationFrame(animate);
  time += 0.01;
  
  // Rotate center ring with glow
  centerRing.rotation.x += 0.003;
  centerRing.rotation.y += 0.005;
  
  // Orbit rods with more dramatic movement
  rod1.rotation.z = Math.PI / 2 + Math.sin(time * 0.5) * 0.4;
  rod2.rotation.z = -Math.PI / 2 + Math.cos(time * 0.5) * 0.4;
  
  // Animate spheres in orbit pattern
  spheres.forEach((sphere, index) => {
    const angle = (time * 0.8) + (index * Math.PI * 2 / spheres.length);
    const radius = 4.5 + Math.sin(time * 0.3) * 0.8;
    
    sphere.mesh.position.x = Math.cos(angle) * radius;
    sphere.mesh.position.y = Math.sin(angle) * radius * 0.7;
    sphere.mesh.position.z = Math.sin(angle * 2) * 2.5;
    
    sphere.mesh.rotation.x += 0.004;
    sphere.mesh.rotation.y += 0.005;
    
    // Update glow position
    sphere.glow.position.copy(sphere.mesh.position);
    sphere.glow.rotation.copy(sphere.mesh.rotation);
  });
  
  // Rotate hexagon lattice slowly
  hexLattice.rotation.z += 0.0002;
  
  // Particle animation
  const particlePositions = particles.geometry.attributes.position.array;
  for(let i = 0; i < particleCount * 3; i += 3) {
    particlePositions[i + 2] += 0.15;
    if(particlePositions[i + 2] > 30) {
      particlePositions[i + 2] = -30;
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;
  
  // Camera orbit
  camera.position.x = Math.sin(time * 0.3) * 6;
  camera.position.y = Math.cos(time * 0.4) * 4;
  camera.lookAt(0, 0, 0);
  
  renderer.render(scene, camera);
}
animate();

// Handle resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>

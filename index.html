<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOLUAIRPOWER Hero</title>
<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#020812;
font-family:Arial,sans-serif;
}
#title{
position:absolute;
left:50%;
bottom:120px;
transform:translateX(-50%);
font-size:72px;
font-weight:700;
letter-spacing:4px;
background:linear-gradient(#ffe08a,#c9961a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
animation:titleIn 2s forwards 4s;
}
#tagline{
position:absolute;
left:50%;
bottom:50px;
transform:translateX(-50%);
text-align:center;
color:#d7d7d7;
font-size:24px;
opacity:0;
animation:tagIn 2s forwards 5.5s;
}
@keyframes titleIn{to{opacity:1}}
@keyframes tagIn{to{opacity:1}}
</style>
</head>
<body>

<div id="title">INSOLUAIRPOWER</div>
<div id="tagline">
Building a Cleaner Carbon Future<br>
for Industry and Society
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020812);

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,1.2);
scene.add(ambient);

const light = new THREE.PointLight(0xffffff,15);
light.position.set(5,8,10);
light.castShadow = true;
scene.add(light);

const light2 = new THREE.PointLight(0x4dd0e1, 8);
light2.position.set(-8, 10, 8);
scene.add(light2);

// Rotating Rings (Wireframe)
const ringGroup = new THREE.Group();
scene.add(ringGroup);

for(let i = 0; i < 5; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(3.5 + i * 1.2, 0.05, 32, 256),
    new THREE.LineBasicMaterial({
      color: 0x00d9c8,
      linewidth: 1,
      transparent: true,
      opacity: 0.6 - i * 0.08
    })
  );
  ring.rotation.x = Math.PI / 2.5 + (i * 0.3);
  ringGroup.add(ring);
}

// particles flowing down
const particleCount = 3000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(particleCount*3);
for(let i=0;i<particleCount*3;i+=3){
  pos[i]=(Math.random()-0.5)*40;
  pos[i+1]=(Math.random()-0.5)*30;
  pos[i+2]=(Math.random()-0.5)*40;
}
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

const particles = new THREE.Points(
  geo,
  new THREE.PointsMaterial({
    color:0x00d9c8,
    size:0.05,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.6
  })
);
scene.add(particles);

// gold material with glow
const gold = new THREE.MeshPhysicalMaterial({
  color:0xd4af37,
  metalness:1,
  roughness:0.05,
  clearcoat:1,
  emissive: 0xffaa00,
  emissiveIntensity: 0.4
});

// Main O ring
const O = new THREE.Mesh(
  new THREE.TorusGeometry(1.4,0.35,64,200),
  gold
);
O.castShadow = true;
O.receiveShadow = true;
scene.add(O);

// molecule spheres with glow
const spheres=[];
const targets=[[-2,1.3,0],[2,1.3,0],[-2,-1.3,0]];

targets.forEach(t=>{
  const s=new THREE.Mesh(
    new THREE.SphereGeometry(0.45,32,32),
    gold
  );
  s.position.set(t[0], t[1], t[2]);
  s.castShadow = true;
  s.receiveShadow = true;
  scene.add(s);
  
  // Glow sphere
  const glowGeo = new THREE.SphereGeometry(0.48, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffaa00,
    transparent: true,
    opacity: 0.3
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.copy(s.position);
  scene.add(glow);
  
  spheres.push({mesh:s, glow:glow, target:t});
});

// Connecting rods
const rod1 = new THREE.Mesh(
  new THREE.CylinderGeometry(0.12, 0.12, 4.6, 32),
  gold
);
rod1.position.set(0, 0, 0);
rod1.rotation.z = Math.PI / 2;
rod1.castShadow = true;
scene.add(rod1);

const rod2 = new THREE.Mesh(
  new THREE.CylinderGeometry(0.12, 0.12, 3.6, 32),
  gold
);
rod2.position.set(0, 0, 0);
rod2.rotation.z = -Math.PI / 2;
rod2.castShadow = true;
scene.add(rod2);

function animate(){
  requestAnimationFrame(animate);

  const time=performance.now()*0.001;

  // Rotate the whole molecule structure
  O.rotation.x += 0.003;
  O.rotation.y += 0.005;
  O.rotation.z += 0.002;
  
  // Rotate rods with slight oscillation
  rod1.rotation.z = Math.PI / 2 + Math.sin(time * 0.5) * 0.2;
  rod2.rotation.z = -Math.PI / 2 + Math.cos(time * 0.5) * 0.2;

  // Orbit spheres around center
  spheres.forEach((sphere, index) => {
    const angle = (time * 0.6) + (index * Math.PI * 2 / spheres.length);
    const radius = 2.2 + Math.sin(time * 0.4 + index) * 0.3;
    
    sphere.mesh.position.x = Math.cos(angle) * radius;
    sphere.mesh.position.y = Math.sin(angle) * radius * 0.8;
    sphere.mesh.position.z = Math.sin(angle * 2) * 0.8;
    
    sphere.mesh.rotation.x += 0.004;
    sphere.mesh.rotation.y += 0.005;
    
    // Update glow
    sphere.glow.position.copy(sphere.mesh.position);
    sphere.glow.scale.set(1 + Math.sin(time * 2 + index) * 0.1, 1 + Math.sin(time * 2 + index) * 0.1, 1);
  });

  // Rotate rings
  ringGroup.rotation.x += 0.0008;
  ringGroup.rotation.y += 0.0012;
  ringGroup.rotation.z += 0.0005;

  // Animate particles flowing down
  const particlePos = particles.geometry.attributes.position.array;
  for(let i=0;i<particleCount*3;i+=3){
    particlePos[i+1] -= 0.08;
    if(particlePos[i+1] < -20) {
      particlePos[i+1] = 20;
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;

  camera.position.x=Math.sin(time*0.2)*0.8;
  camera.position.y=Math.cos(time*0.2)*0.3;
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOLUAIRPOWER - Premium O2 Animation</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #020812;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
}

#canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#title {
  position: absolute;
  left: 50%;
  bottom: 120px;
  transform: translateX(-50%);
  font-size: 84px;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  text-shadow: 0 0 50px rgba(212, 175, 55, 0.8);
  animation: titleFadeIn 2s ease-out forwards;
  animation-delay: 8s;
  filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
}

#tagline {
  position: absolute;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%);
  text-align: center;
  color: #4dd0e1;
  font-size: 18px;
  letter-spacing: 2px;
  opacity: 0;
  animation: taglineFadeIn 2s ease-out forwards;
  animation-delay: 10s;
  text-shadow: 0 0 20px rgba(77, 208, 225, 0.6);
}

@keyframes titleFadeIn {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
}

@keyframes taglineFadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

#loading-bar {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 3px;
  background: rgba(77, 208, 225, 0.2);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  animation: loadingBarFade 0.5s ease-out forwards;
}

#loading-bar::after {
  content: '';
  position: absolute;
  height: 100%;
  background: linear-gradient(90deg, #4dd0e1, #00ffff);
  animation: loadingBarFill 12s ease-in-out forwards;
  width: 0;
}

@keyframes loadingBarFade {
  to {
    opacity: 1;
  }
}

@keyframes loadingBarFill {
  0% { width: 0%; }
  50% { width: 50%; }
  100% { width: 100%; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="loading-bar"></div>
<div id="title">INSOLUAIRPOWER</div>
<div id="tagline">Building a Cleaner Carbon Future<br>for Industry and Society</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@r128/build/three.module.js';

// Scene Setup
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x020812, 1);
camera.position.z = 15;

// Timeline & Animation States
const timeline = {
  totalDuration: 12, // seconds
  stage1: { start: 0, duration: 1.5 },      // Dark screen
  stage2: { start: 1.5, duration: 2 },      // Teal particles
  stage3: { start: 3.5, duration: 2.5 },    // Holographic rings
  stage4: { start: 6, duration: 2.5 },      // Molecule assembles
  stage5: { start: 8.5, duration: 1.5 },    // Gold O appears
  stage6: { start: 10, duration: 1.5 },     // Text emerges
  stage7: { start: 11.5, duration: 1 }      // Tagline
};

let currentTime = 0;
let animationComplete = false;

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0xffffff, 2);
pointLight1.position.set(10, 15, 20);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xffd700, 3);
pointLight2.position.set(-15, 10, 15);
scene.add(pointLight2);

const pointLight3 = new THREE.PointLight(0x4dd0e1, 2);
pointLight3.position.set(0, 20, 10);
scene.add(pointLight3);

// ============ STAGE 2: Particles ============
const particleSystem = createParticleSystem();
function createParticleSystem() {
  const geometry = new THREE.BufferGeometry();
  const particleCount = 3000;
  const positions = new Float32Array(particleCount * 3);
  const opacities = new Float32Array(particleCount);

  for (let i = 0; i < particleCount * 3; i += 3) {
    positions[i] = (Math.random() - 0.5) * 80;
    positions[i + 1] = (Math.random() - 0.5) * 80;
    positions[i + 2] = (Math.random() - 0.5) * 80;
    opacities[i / 3] = 0;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('opacity', new THREE.BufferAttribute(opacities, 1));

  const material = new THREE.PointsMaterial({
    color: 0x4dd0e1,
    size: 0.2,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.8,
    emissive: 0x4dd0e1,
    emissiveIntensity: 0.5
  });

  const particles = new THREE.Points(geometry, material);
  scene.add(particles);
  return particles;
}

// ============ STAGE 3: Holographic Rings ============
const ringsGroup = new THREE.Group();
scene.add(ringsGroup);

function createHolographicRings() {
  const ringCount = 6;
  const rings = [];

  for (let i = 0; i < ringCount; i++) {
    const ringGeometry = new THREE.BufferGeometry();
    const ringRadius = 3 + i * 1.5;
    const segments = 256;
    const positions = new Float32Array(segments * 3);

    for (let j = 0; j < segments; j++) {
      const angle = (j / segments) * Math.PI * 2;
      positions[j * 3] = Math.cos(angle) * ringRadius;
      positions[j * 3 + 1] = Math.sin(angle) * ringRadius;
      positions[j * 3 + 2] = (Math.random() - 0.5) * 0.5;
    }

    ringGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const ringMaterial = new THREE.LineBasicMaterial({
      color: 0x00ffff,
      linewidth: 2,
      transparent: true,
      opacity: 0,
      emissive: 0x00ffff,
      emissiveIntensity: 1
    });

    const ring = new THREE.Line(ringGeometry, ringMaterial);
    ring.rotation.x = (i * 0.3) + (Math.PI / 2.5);
    ring.renderOrder = 1;
    ringsGroup.add(ring);
    rings.push({ mesh: ring, radius: ringRadius });
  }

  return rings;
}

const rings = createHolographicRings();

// ============ STAGE 4 & 5: O2 Molecule ============
const goldMaterial = new THREE.MeshStandardMaterial({
  color: 0xffd700,
  metalness: 0.95,
  roughness: 0.05,
  emissive: 0xffaa00,
  emissiveIntensity: 0.5,
  envMapIntensity: 2
});

const moleculeGroup = new THREE.Group();
scene.add(moleculeGroup);

// Central O Ring
const centralRing = new THREE.Mesh(
  new THREE.TorusGeometry(1.5, 0.4, 64, 200),
  goldMaterial
);
centralRing.scale.set(0, 0, 0);
moleculeGroup.add(centralRing);

// Connecting Rods
const rod1 = new THREE.Mesh(
  new THREE.CylinderGeometry(0.15, 0.15, 4.5, 32),
  goldMaterial
);
rod1.rotation.z = Math.PI / 2;
rod1.scale.set(0, 0, 0);
moleculeGroup.add(rod1);

const rod2 = new THREE.Mesh(
  new THREE.CylinderGeometry(0.15, 0.15, 3.5, 32),
  goldMaterial
);
rod2.rotation.z = -Math.PI / 2;
rod2.scale.set(0, 0, 0);
moleculeGroup.add(rod2);

// Oxygen Atoms (Spheres)
const spheres = [];
const spherePositions = [
  { x: 4.5, y: 0, z: 0 },
  { x: -4.5, y: 0, z: 0 },
  { x: 0, y: 4.5, z: 0 }
];

spherePositions.forEach((pos, index) => {
  const sphereGeometry = new THREE.SphereGeometry(0.7, 64, 64);
  const sphere = new THREE.Mesh(sphereGeometry, goldMaterial);
  sphere.position.set(pos.x, pos.y, pos.z);
  sphere.scale.set(0, 0, 0);
  moleculeGroup.add(sphere);

  // Glow
  const glowGeometry = new THREE.SphereGeometry(0.75, 32, 32);
  const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0xffaa00,
    transparent: true,
    opacity: 0,
    emissive: 0xffaa00,
    emissiveIntensity: 0.8
  });
  const glow = new THREE.Mesh(glowGeometry, glowMaterial);
  glow.position.copy(sphere.position);
  moleculeGroup.add(glow);

  spheres.push({ mesh: sphere, glow: glow, pos: pos });
});

// O2 Text Label
const o2TextGroup = new THREE.Group();
scene.add(o2TextGroup);

const textCanvas = document.createElement('canvas');
textCanvas.width = 512;
textCanvas.height = 256;
const ctx = textCanvas.getContext('2d');
ctx.fillStyle = '#ffd700';
ctx.font = 'bold 180px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.shadowColor = '#ffaa00';
ctx.shadowBlur = 30;
ctx.fillText('O₂', 256, 128);

const textTexture = new THREE.CanvasTexture(textCanvas);
const textMaterial = new THREE.SpriteMaterial({ map: textTexture });
const o2Sprite = new THREE.Sprite(textMaterial);
o2Sprite.scale.set(6, 3, 1);
o2Sprite.position.z = 8;
o2Sprite.material.opacity = 0;
o2TextGroup.add(o2Sprite);

// ============ ANIMATION LOOP ============
function updateAnimation(elapsed) {
  currentTime = elapsed;

  // STAGE 1: Dark Screen (0-1.5s)
  // Just black, nothing happens

  // STAGE 2: Particles Appear (1.5-3.5s)
  if (currentTime >= timeline.stage2.start && currentTime < timeline.stage2.start + timeline.stage2.duration) {
    const progress = (currentTime - timeline.stage2.start) / timeline.stage2.duration;
    const opacities = particleSystem.geometry.attributes.opacity.array;
    
    for (let i = 0; i < opacities.length; i++) {
      opacities[i] = Math.min(1, progress * 1.2);
    }
    particleSystem.geometry.attributes.opacity.needsUpdate = true;
    particleSystem.material.opacity = progress;
  }

  // STAGE 3: Rings Form (3.5-6s)
  if (currentTime >= timeline.stage3.start && currentTime < timeline.stage3.start + timeline.stage3.duration) {
    const progress = (currentTime - timeline.stage3.start) / timeline.stage3.duration;
    
    rings.forEach((ring, index) => {
      const delay = index * 0.1;
      const ringProgress = Math.max(0, Math.min(1, (progress - delay) / 0.6));
      ring.mesh.material.opacity = ringProgress * 0.7;
      ring.mesh.rotation.x += 0.01;
      ring.mesh.rotation.y += 0.015;
    });

    ringsGroup.rotation.x += 0.003;
    ringsGroup.rotation.y += 0.005;
  }

  // STAGE 4: Molecule Assembles (6-8.5s)
  if (currentTime >= timeline.stage4.start && currentTime < timeline.stage4.start + timeline.stage4.duration) {
    const progress = (currentTime - timeline.stage4.start) / timeline.stage4.duration;

    // Scale rods
    rod1.scale.set(progress, progress, progress);
    rod2.scale.set(progress, progress, progress);

    // Scale and position spheres with stagger
    spheres.forEach((sphere, index) => {
      const sphereProgress = Math.max(0, Math.min(1, (progress - (index * 0.15)) / 0.5));
      sphere.mesh.scale.set(sphereProgress, sphereProgress, sphereProgress);
      sphere.mesh.rotation.x += 0.05;
      sphere.mesh.rotation.y += 0.07;
    });

    moleculeGroup.rotation.y += 0.02;
  }

  // STAGE 5: Gold O Appears (8.5-10s)
  if (currentTime >= timeline.stage5.start && currentTime < timeline.stage5.start + timeline.stage5.duration) {
    const progress = (currentTime - timeline.stage5.start) / timeline.stage5.duration;

    centralRing.scale.set(progress, progress, progress);
    centralRing.rotation.x += 0.02;
    centralRing.rotation.y += 0.03;

    // Glow effect
    spheres.forEach((sphere) => {
      sphere.glow.material.opacity = progress * 0.5;
      sphere.glow.scale.set(
        1 + Math.sin(currentTime * 3) * 0.1 + progress * 0.2,
        1 + Math.sin(currentTime * 3) * 0.1 + progress * 0.2,
        1
      );
    });
  }

  // STAGE 6: Text Emerges (10-11.5s)
  if (currentTime >= timeline.stage6.start && currentTime < timeline.stage6.start + timeline.stage6.duration) {
    const progress = (currentTime - timeline.stage6.start) / timeline.stage6.duration;
    o2Sprite.material.opacity = progress;
    o2Sprite.scale.set(
      6 + progress * 1,
      3 + progress * 0.5,
      1
    );
  }

  // Keep animations running
  moleculeGroup.rotation.y += 0.005;
  centralRing.rotation.z += 0.01;

  // Particle flow animation
  const positions = particleSystem.geometry.attributes.position.array;
  for (let i = 1; i < positions.length; i += 3) {
    positions[i] -= 0.03;
    if (positions[i] < -40) {
      positions[i] = 40;
    }
  }
  particleSystem.geometry.attributes.position.needsUpdate = true;

  // Animation complete after stage 7
  if (currentTime > timeline.totalDuration) {
    animationComplete = true;
  }
}

// Animation Frame Loop
function animate() {
  requestAnimationFrame(animate);

  const elapsed = (Date.now() % (timeline.totalDuration * 1000)) / 1000;
  updateAnimation(elapsed);

  renderer.render(scene, camera);
}

// Handle Window Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>

</body>
</html>

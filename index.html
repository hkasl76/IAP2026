<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSOLUAIRPOWER - O2 Molecule</title>
<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#0a1929;
font-family:Arial,sans-serif;
}
#title{
position:absolute;
left:50%;
bottom:80px;
transform:translateX(-50%);
font-size:72px;
font-weight:700;
letter-spacing:8px;
background:linear-gradient(#d4af37,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
animation:titleIn 2s forwards 3s;
text-shadow: 0 0 30px rgba(212,175,55,0.5);
}
#tagline{
position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
text-align:center;
color:#4dd0e1;
font-size:18px;
opacity:0;
animation:tagIn 2s forwards 4s;
letter-spacing:2px;
}
@keyframes titleIn{to{opacity:1}}
@keyframes tagIn{to{opacity:1}}
</style>
</head>
<body>

<div id="title">INSOLUAIRPOWER</div>
<div id="tagline">Building a Cleaner Carbon Future</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1929);
scene.fog = new THREE.Fog(0x0a1929, 50, 100);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0x4dd0e1, 2);
pointLight1.position.set(10, 10, 15);
pointLight1.castShadow = true;
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xd4af37, 2);
pointLight2.position.set(-10, -10, 15);
pointLight2.castShadow = true;
scene.add(pointLight2);

// Hexagonal Lattice Background
function createHexagonalLattice() {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const colors = [];
  const spacing = 2;
  
  for(let x = -10; x <= 10; x++) {
    for(let y = -10; y <= 10; y++) {
      const offsetX = (y % 2) * spacing / 2;
      const posX = x * spacing + offsetX;
      const posY = y * spacing * Math.sqrt(3) / 2;
      const posZ = -15 + Math.random() * 2;
      
      vertices.push(posX, posY, posZ);
      
      // Cyan color
      colors.push(0.3, 0.8, 1.0);
    }
  }
  
  // Create hexagon lines
  const lines = new THREE.BufferGeometry();
  const lineVertices = [];
  
  for(let x = -10; x <= 10; x++) {
    for(let y = -10; y <= 10; y++) {
      const offsetX = (y % 2) * spacing / 2;
      const posX = x * spacing + offsetX;
      const posY = y * spacing * Math.sqrt(3) / 2;
      const posZ = -15;
      
      // Connect to neighbors
      if(x < 10) {
        const nextOffsetX = ((y+1) % 2) * spacing / 2;
        const nextX = (x+1) * spacing + offsetX;
        lineVertices.push(posX, posY, posZ);
        lineVertices.push(nextX, posY, posZ);
      }
      
      if(y < 10) {
        const nextOffsetX = ((y+1) % 2) * spacing / 2;
        const nextY = (y+1) * spacing * Math.sqrt(3) / 2;
        const nextX = x * spacing + nextOffsetX;
        lineVertices.push(posX, posY, posZ);
        lineVertices.push(nextX, nextY, posZ);
      }
    }
  }
  
  lines.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lineVertices), 3));
  const lineMaterial = new THREE.LineBasicMaterial({color: 0x00d9c8, linewidth: 2, fog: false});
  const hexLines = new THREE.LineSegments(lines, lineMaterial);
  return hexLines;
}

const hexLattice = createHexagonalLattice();
scene.add(hexLattice);

// Particle system
const particleCount = 2000;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount * 3; i += 3) {
  particlePositions[i] = (Math.random() - 0.5) * 60;
  particlePositions[i + 1] = (Math.random() - 0.5) * 60;
  particlePositions[i + 2] = (Math.random() - 0.5) * 40 - 10;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMaterial = new THREE.PointsMaterial({
  color: 0x4dd0e1,
  size: 0.1,
  sizeAttenuation: true,
  fog: false
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Gold Material
const goldMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xd4af37,
  metalness: 0.95,
  roughness: 0.08,
  clearcoat: 1,
  clearcoatRoughness: 0.1,
  emissive: 0x8b6914,
  emissiveIntensity: 0.3
});

// O2 Molecule - Center Oxygen Ring
const ringGeometry = new THREE.TorusGeometry(2, 0.4, 64, 200);
const centerRing = new THREE.Mesh(ringGeometry, goldMaterial);
centerRing.castShadow = true;
scene.add(centerRing);

// Connecting rods
const rodGeometry = new THREE.CylinderGeometry(0.15, 0.15, 4, 32);
const rod1 = new THREE.Mesh(rodGeometry, goldMaterial);
rod1.position.set(0, 0, 0);
rod1.rotation.z = Math.PI / 2;
rod1.castShadow = true;
scene.add(rod1);

const rod2 = new THREE.Mesh(rodGeometry, goldMaterial);
rod2.position.set(0, 0, 0);
rod2.rotation.z = -Math.PI / 2;
rod2.castShadow = true;
scene.add(rod2);

// Oxygen atoms (spheres)
const sphereGeometry = new THREE.SphereGeometry(0.8, 64, 64);
const spheres = [];

const positions = [
  {x: 4, y: 0, z: 0},
  {x: -4, y: 0, z: 0},
  {x: 0, y: 4, z: 0}
];

positions.forEach(pos => {
  const sphere = new THREE.Mesh(sphereGeometry, goldMaterial);
  sphere.position.set(pos.x, pos.y, pos.z);
  sphere.castShadow = true;
  sphere.receiveShadow = true;
  scene.add(sphere);
  spheres.push({mesh: sphere, startPos: {x: pos.x, y: pos.y, z: pos.z}});
});

// O2 text label
const canvas = document.createElement('canvas');
canvas.width = 512;
canvas.height = 256;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#d4af37';
ctx.font = 'bold 120px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('O₂', 256, 128);

const texture = new THREE.CanvasTexture(canvas);
const spriteMaterial = new THREE.SpriteMaterial({map: texture});
const sprite = new THREE.Sprite(spriteMaterial);
sprite.position.z = 8;
sprite.scale.set(8, 4, 1);
scene.add(sprite);

// Animation loop
let time = 0;
function animate(){
  requestAnimationFrame(animate);
  time += 0.01;
  
  // Rotate center ring
  centerRing.rotation.x += 0.003;
  centerRing.rotation.y += 0.005;
  
  // Orbit rods
  rod1.rotation.z = Math.PI / 2 + Math.sin(time * 0.5) * 0.3;
  rod2.rotation.z = -Math.PI / 2 + Math.cos(time * 0.5) * 0.3;
  
  // Animate spheres in orbit pattern
  spheres.forEach((sphere, index) => {
    const angle = (time * 0.8) + (index * Math.PI * 2 / spheres.length);
    const radius = 4 + Math.sin(time * 0.3) * 0.5;
    
    sphere.mesh.position.x = Math.cos(angle) * radius;
    sphere.mesh.position.y = Math.sin(angle) * radius * 0.6;
    sphere.mesh.position.z = Math.sin(angle * 2) * 2;
    sphere.mesh.rotation.x += 0.002;
    sphere.mesh.rotation.y += 0.003;
  });
  
  // Rotate hexagon lattice slowly
  hexLattice.rotation.z += 0.0002;
  
  // Particle animation
  const particlePositions = particles.geometry.attributes.position.array;
  for(let i = 0; i < particleCount * 3; i += 3) {
    particlePositions[i + 2] += 0.1;
    if(particlePositions[i + 2] > 20) {
      particlePositions[i + 2] = -20;
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;
  
  // Camera orbit
  camera.position.x = Math.sin(time * 0.3) * 5;
  camera.position.y = Math.cos(time * 0.4) * 3;
  camera.lookAt(0, 0, 0);
  
  renderer.render(scene, camera);
}
animate();

// Handle resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
